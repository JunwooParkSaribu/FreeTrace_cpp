# Build and release FreeTrace C++ binaries for all platforms
# Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-14
#
# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags
# Creates a GitHub Release with pre-built binaries for Linux, macOS, and Windows.
# Each archive includes: freetrace binary + models/ + ONNX Runtime libs (fBm support).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.3/onnxruntime-linux-x64-1.24.3.tgz
            ort_dir: onnxruntime-linux-x64-1.24.3
            archive_ext: tar.gz
            lib_glob: "lib/libonnxruntime*.so*"

          - os: macos-latest
            name: macos-arm64
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.3/onnxruntime-osx-arm64-1.24.3.tgz
            ort_dir: onnxruntime-osx-arm64-1.24.3
            archive_ext: tar.gz
            lib_glob: "lib/libonnxruntime*.dylib"

          - os: windows-latest
            name: windows-x64
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.3/onnxruntime-win-x64-1.24.3.zip
            ort_dir: onnxruntime-win-x64-1.24.3
            archive_ext: zip
            lib_glob: "lib/*.dll"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libtiff-dev libpng-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libtiff libpng

      - name: Install dependencies (Windows) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-14
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install tiff:x64-windows libpng:x64-windows zlib:x64-windows

      - name: Download ONNX Runtime
        shell: bash
        run: |
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            curl -L -o ort.zip "${{ matrix.ort_url }}"
            unzip -q ort.zip
          else
            curl -L -o ort.tgz "${{ matrix.ort_url }}"
            tar xzf ort.tgz
          fi

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_ONNXRUNTIME=ON \
            -DONNXRUNTIME_DIR=$(pwd)/../${{ matrix.ort_dir }}
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-14
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build
          cd build
          $ortDir = (Resolve-Path "..\${{ matrix.ort_dir }}").Path
          cmake .. -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
                   -DUSE_ONNXRUNTIME=ON `
                   -DONNXRUNTIME_DIR="$ortDir"
          cmake --build . --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST="freetrace-${{ matrix.name }}"
          mkdir -p "$DIST/lib"
          cp build/freetrace "$DIST/"
          cp -r models "$DIST/"
          cp ${{ matrix.ort_dir }}/${{ matrix.lib_glob }} "$DIST/lib/"
          cat > "$DIST/run_freetrace.sh" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          exec "$DIR/freetrace" "$@"
          SCRIPT
          chmod +x "$DIST/run_freetrace.sh" "$DIST/freetrace"
          tar czf "$DIST.tar.gz" "$DIST"

      - name: Package DMG (macOS) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-16
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DIST="freetrace-${{ matrix.name }}"
          DMG_NAME="FreeTrace_v1.6.0.4_macos_arm64"
          mkdir -p "$DIST/FreeTrace/lib" "$DIST/FreeTrace/models"

          # Copy binary, models, GUI
          cp build/freetrace "$DIST/FreeTrace/"
          chmod +x "$DIST/FreeTrace/freetrace"
          cp models/*.onnx "$DIST/FreeTrace/models/" 2>/dev/null || true
          cp models/*.bin "$DIST/FreeTrace/models/" 2>/dev/null || true
          cp ${{ matrix.ort_dir }}/${{ matrix.lib_glob }} "$DIST/FreeTrace/lib/"
          cp gui.py "$DIST/FreeTrace/" 2>/dev/null || true

          # Fix dylib paths to use @executable_path
          for dylib in "$DIST/FreeTrace/lib"/libonnxruntime*.dylib; do
            dylib_name=$(basename "$dylib")
            install_name_tool -change "@rpath/$dylib_name" "@executable_path/lib/$dylib_name" "$DIST/FreeTrace/freetrace" 2>/dev/null || true
            install_name_tool -change "${{ matrix.ort_dir }}/lib/$dylib_name" "@executable_path/lib/$dylib_name" "$DIST/FreeTrace/freetrace" 2>/dev/null || true
            install_name_tool -id "@executable_path/lib/$dylib_name" "$dylib" 2>/dev/null || true
          done

          # Wrapper script
          cat > "$DIST/FreeTrace/run_freetrace.sh" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export DYLD_LIBRARY_PATH="$DIR/lib:$DYLD_LIBRARY_PATH"
          exec "$DIR/freetrace" "$@"
          SCRIPT
          chmod +x "$DIST/FreeTrace/run_freetrace.sh"

          # Double-clickable GUI launcher # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-16
          cat > "$DIST/FreeTrace/FreeTrace GUI.command" << 'GUILAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR"
          PYTHON=""
          if command -v python3 &>/dev/null; then PYTHON="python3"
          elif [ -f "/opt/homebrew/bin/python3" ]; then PYTHON="/opt/homebrew/bin/python3"
          elif [ -f "/usr/local/bin/python3" ]; then PYTHON="/usr/local/bin/python3"; fi
          if [ -z "$PYTHON" ]; then
            osascript -e 'display dialog "Python 3 not found.\nInstall with: brew install python3" with title "FreeTrace" buttons {"OK"} default button "OK" with icon stop'
            exit 1
          fi
          if ! "$PYTHON" -c "import PyQt6" 2>/dev/null; then
            osascript -e 'display dialog "PyQt6 not found.\nInstall with: pip3 install PyQt6" with title "FreeTrace" buttons {"OK"} default button "OK" with icon stop'
            exit 1
          fi
          exec "$PYTHON" "$DIR/gui.py"
          GUILAUNCHER
          chmod +x "$DIST/FreeTrace/FreeTrace GUI.command"

          # README
          cat > "$DIST/FreeTrace/README.txt" << 'README'
          FreeTrace — macOS (Apple Silicon)
          Single-molecule tracking software with fBm inference.

          Usage: ./freetrace <input.tiff> <output_dir> [options]
          GUI:   pip install PyQt6 && python gui.py

          If macOS blocks the app: xattr -cr /path/to/FreeTrace/
          https://github.com/JunwooParkSaribu/FreeTrace_cpp
          README

          # Ad-hoc code sign
          codesign --force --sign - "$DIST/FreeTrace/freetrace"
          for dylib in "$DIST/FreeTrace/lib"/*.dylib; do
            codesign --force --sign - "$dylib"
          done

          # Create .dmg (two-step: rw image → compressed) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-16
          CONTENT_KB=$(du -sk "$DIST" | cut -f1)
          DMG_MB=$(( (CONTENT_KB / 1024) + 50 ))
          hdiutil create -volname "FreeTrace" -size "${DMG_MB}m" -fs HFS+ -ov "$DMG_NAME.rw.dmg"
          hdiutil attach "$DMG_NAME.rw.dmg" -mountpoint /tmp/freetrace_dmg_mount
          cp -R "$DIST"/* /tmp/freetrace_dmg_mount/
          hdiutil detach /tmp/freetrace_dmg_mount
          hdiutil convert "$DMG_NAME.rw.dmg" -format UDZO -o "$DMG_NAME.dmg"
          rm -f "$DMG_NAME.rw.dmg"

          # Also create tar.gz for backward compatibility
          tar czf "$DIST.tar.gz" -C "$DIST" FreeTrace

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $DIST = "freetrace-${{ matrix.name }}"
          New-Item -ItemType Directory -Path "$DIST" -Force
          Copy-Item "build/Release/freetrace.exe" "$DIST/"
          Copy-Item -Recurse "models" "$DIST/"
          # Copy ONNX Runtime DLLs next to exe
          Copy-Item "${{ matrix.ort_dir }}/lib/*.dll" "$DIST/"
          # Copy all vcpkg dependency DLLs (tiff, png, zlib, jpeg, lzma, etc.) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-15
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination "$DIST/"
          Compress-Archive -Path "$DIST" -DestinationPath "$DIST.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freetrace-${{ matrix.name }}
          path: freetrace-${{ matrix.name }}.${{ matrix.archive_ext }}

      - name: Upload DMG artifact (macOS) # Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-16
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: freetrace-macos-dmg
          path: FreeTrace_v*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
# Modified by Claude (claude-opus-4-6, Anthropic AI) - 2026-03-14
